# clamd configuration for KD-HCBLM (mounted into clamav/clamav:stable).
#
# Why this file exists: clamd's default StreamMaxLength (~100 MB) rejects our
# training videos (which can reach MEDIA_MAX_BYTES = 500 MB). Uploads over the
# default limit were being blocked as "ClamAV: indisponible". We raise the scan
# size limits so real media can be scanned end-to-end.
#
# NOTE: this is a complete clamd.conf (no `Example` line, which would make clamd
# refuse to start). freshclam keeps its own default config (virus-DB updates
# untouched).

DatabaseDirectory /var/lib/clamav
Foreground yes
LogTime yes
MaxThreads 4

# Listen on TCP (the API connects to clamav:3310) and a local socket (used by the
# image's clamdcheck.sh healthcheck).
TCPSocket 3310
LocalSocket /tmp/clamd.sock
LocalSocketMode 660

# --- size limits: raised so media up to MEDIA_MAX_BYTES (500 MB) is scanned ---
StreamMaxLength 512M
MaxScanSize 512M
MaxFileSize 512M
MaxScanTime 300000
