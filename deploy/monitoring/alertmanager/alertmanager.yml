route:
  receiver: default
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  # Default receiver drops alerts silently until you wire a real channel. To get
  # notified, uncomment ONE of the blocks below (or add email_configs).
  - name: default
