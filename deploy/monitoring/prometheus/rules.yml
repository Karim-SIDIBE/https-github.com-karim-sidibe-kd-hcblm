groups:
  - name: kd-api
    rules:
      - alert: ApiDown
        expr: up{job="kd-api"} == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "API KD injoignable (scrape /metrics down depuis 2 min)"

      - alert: HighErrorRate
        expr: |
          sum(rate(http_requests_total{status=~"5.."}[5m]))
          / clamp_min(sum(rate(http_requests_total[5m])), 1) > 0.02
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Taux d'erreurs 5xx > 2% sur 5 min"

      - alert: HighLatency
        expr: |
          sum(rate(http_request_duration_seconds_sum[5m]))
          / clamp_min(sum(rate(http_request_duration_seconds_count[5m])), 1) > 0.5
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Latence moyenne API > 500 ms sur 10 min"

      - alert: HighMemory
        expr: process_resident_memory_bytes{job="kd-api"} > 700e6
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "RSS de l'API > 700 Mo (proche du mem_limit 768m)"
