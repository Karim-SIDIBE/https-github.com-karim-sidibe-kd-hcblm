# KD-HCBLM API stack for a VPS (LWS) — Fastify API + PostgreSQL 16 + Caddy (auto-HTTPS).
# Usage (from repo root on the VPS):
#   cp deploy/.env.example deploy/.env   # then fill the secrets
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
name: kd-hcblm

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: declick
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: kd_hcblm
    # Tuned for a 2 vCore / 4 GB VPS (~300 active learners / 30 days). Postgres is
    # capped so the API + Caddy + OS keep headroom. See deploy/README.md §Capacité.
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1024MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "random_page_cost=1.1"            # NVMe SSD: random ≈ sequential
      - "-c"
      - "effective_io_concurrency=200"    # NVMe SSD
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_compression=on"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "min_wal_size=128MB"
      - "-c"
      - "jit=off"                         # tiny DB: JIT overhead not worth it
    shm_size: "256mb"
    mem_limit: 1536m
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U declick -d kd_hcblm"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    mem_limit: 768m
    env_file: .env
    environment:
      # The API reaches Postgres over the compose network (service name "db").
      # connection_limit keeps the Prisma pool well under Postgres max_connections.
      DATABASE_URL: "postgresql://declick:${POSTGRES_PASSWORD}@db:5432/kd_hcblm?schema=public&connection_limit=15&pool_timeout=30"
      # Cap the V8 heap under the container mem_limit (leaves room for non-heap).
      NODE_OPTIONS: "--max-old-space-size=640"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/server/.media
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    expose:
      - "4000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web/dist:/srv/pwa:ro          # static PWA build, served on app.declick.digital
      - ../admin/dist:/srv/admin:ro      # static admin console, served on admin.declick.digital
      - media:/srv/media:ro              # raw media objects (CDN pull origin — see deploy/CDN.md)
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  media:
  caddy_data:
  caddy_config:
