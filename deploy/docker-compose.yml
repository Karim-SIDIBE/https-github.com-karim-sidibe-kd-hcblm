# KD-HCBLM API stack for a VPS (LWS) — Fastify API + PostgreSQL 16 + Caddy (auto-HTTPS).
# Usage (from repo root on the VPS):
#   cp deploy/.env.example deploy/.env   # then fill the secrets
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
name: kd-hcblm

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: declick
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      POSTGRES_DB: kd_hcblm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U declick -d kd_hcblm"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # The API reaches Postgres over the compose network (service name "db").
      DATABASE_URL: postgresql://declick:${POSTGRES_PASSWORD}@db:5432/kd_hcblm?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/server/.media
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    expose:
      - "4000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pgdata:
  media:
  caddy_data:
  caddy_config:
